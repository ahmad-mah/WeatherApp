name: weather_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  dio: ^5.10.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_hooks: ^0.21.3+1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.3.0
  fpdart: ^1.2.0
  geolocator: ^14.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hooks_riverpod: ^3.3.2
  slang: ^4.18.0
  slang_flutter: ^4.18.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  slang_build_runner: ^4.18.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icons/material/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
        - asset: assets/fonts/Manrope-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800
